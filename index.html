<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: http: https:; media-src 'self' blob: data:; img-src 'self' data: blob: http: https:;">
    <title>Telepam Messenger</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- AUTH MODAL -->
    <div id="authModal" class="modal-overlay">
        <div class="modal">
            <h2>🔐 Telepam</h2>
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab">Войти</div>
                <div class="auth-tab" id="registerTab">Регистрация</div>
            </div>
            <div id="loginForm">
                <div class="form-group">
                    <label>ID (@username)</label>
                    <input type="text" id="loginId" placeholder="@username">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPass" placeholder="******">
                </div>
                <button class="btn-primary" id="loginBtn">Войти</button>
            </div>
            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>ID (@username)</label>
                    <input type="text" id="authId" placeholder="@username">
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="authName" placeholder="Иван">
                </div>
                <div class="form-group">
                    <label>Фамилия</label>
                    <input type="text" id="authSurname" placeholder="Иванов">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="authPass" placeholder="******">
                </div>
                <div class="form-group">
                    <label>Аватарка</label>
                    <input type="file" id="authAvatar" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Цвет</label>
                    <input type="color" id="authColor" value="#007aff" style="height:50px;">
                </div>
                <div class="form-group">
                    <label>О себе</label>
                    <textarea id="authBio" rows="2"></textarea>
                </div>
                <button class="btn-primary" id="registerBtn">Зарегистрироваться</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appInterface" class="hidden">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="my-profile-btn" id="myProfileBtn">?</button>
                <div class="my-profile-sidebar hidden" id="myProfileSidebar">
                    <div class="avatar" id="myProfileAvatar"></div>
                    <div class="profile-name" id="myProfileName"></div>
                    <div class="profile-id" id="myProfileId"></div>
                    <div class="profile-actions">
                        <div class="profile-action" id="openProfileSettings">⚙️ Настройки</div>
                        <div class="profile-action" id="openPrivacySettings">🔒 Приватность</div>
                        <div class="profile-action" id="openThemeSettings">🎨 Тема</div>
                        <div class="profile-action" id="logoutBtn">🚪 Выйти</div>
                    </div>
                </div>
                <input type="text" class="search-box" placeholder="Поиск" id="searchInput">
                <div class="search-suggestions hidden" id="searchSuggestions"></div>
            </div>
            <div class="folders-bar" id="foldersBar"></div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- MAIN CHAT -->
        <div class="main-chat" id="mainChat">
            <div class="chat-header" id="chatHeader">
                <div class="chat-header-left">
                    <button class="back-btn" id="showChatListBtn">←</button>
                    <div class="avatar" id="headerAvatar"></div>
                    <div class="chat-header-info">
                        <div class="chat-header-name" id="headerName">Выберите чат</div>
                        <div class="chat-status" id="headerStatus"></div>
                    </div>
                </div>
                <button class="icon-btn" id="toggleSettingsBtn">⋮</button>
                <div class="settings-menu hidden" id="settingsMenu">
                    <div class="settings-item" id="openCreateGroup">👥 Создать группу</div>
                    <div class="settings-item" id="openFoldersManager">📁 Папки</div>
                    <div class="settings-item" id="toggleTheme">🌓 Тема</div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea"></div>
            <div class="typing-indicator hidden" id="typingIndicator"></div>
            
            <div class="reply-preview hidden" id="replyPreview">
                <div class="reply-preview-text" id="replyPreviewText"></div>
                <button class="reply-preview-close" id="cancelReplyBtn">✕</button>
            </div>

            <div class="input-area">
                <button class="icon-btn" id="fileInputBtn">📎</button>
                <input type="file" id="fileInput" class="hidden" accept="image/*,video/*,audio/*">
                <button class="icon-btn" id="toggleStickersBtn">🎭</button>
                <button class="icon-btn" id="toggleEmojiBtn">😊</button>
                <input type="text" class="message-input" id="messageInput" placeholder="Написать сообщение...">
                <button class="icon-btn record-btn" id="recordBtn">🎤</button>
                <button class="icon-btn send-btn" id="sendBtn">➤</button>
            </div>

            <div class="stickers-panel hidden" id="stickersPanel"></div>
            <div class="emoji-picker hidden" id="emojiPicker"></div>
            <div class="forward-panel hidden" id="forwardPanel"></div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="chatSettingsModal" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="chatSettingsTitle">Настройки чата</h2>
            <div class="modal-tabs">
                <div class="modal-tab active" data-tab="participants">Участники</div>
                <div class="modal-tab" data-tab="media">Медиа</div>
                <div class="modal-tab" data-tab="files">Файлы</div>
            </div>
            <div id="tab-participants" class="tab-content active">
                <div class="member-select" id="participantsList"></div>
            </div>
            <div id="tab-media" class="tab-content">
                <div class="chat-media-grid" id="mediaGrid"></div>
            </div>
            <div id="tab-files" class="tab-content">
                <div id="filesList"></div>
            </div>
            <button class="btn-primary btn-secondary" id="closeChatSettingsBtn">Закрыть</button>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay hidden">
        <div class="modal">
            <h2>👤 Профиль</h2>
            <div class="form-group">
                <label>ID</label>
                <input type="text" id="profileId" readonly>
            </div>
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="profileName">
            </div>
            <div class="form-group">
                <label>Фамилия</label>
                <input type="text" id="profileSurname">
            </div>
            <div class="form-group">
                <label>Аватарка</label>
                <input type="file" id="profileAvatar" accept="image/*">
            </div>
            <div class="form-group">
                <label>Цвет</label>
                <input type="color" id="profileColor" style="height:50px;">
            </div>
            <div class="form-group">
                <label>О себе</label>
                <textarea id="profileBio" rows="3"></textarea>
            </div>
            <button class="btn-primary" id="saveProfileBtn">Сохранить</button>
            <button class="btn-primary btn-secondary" id="closeProfileBtn">Отмена</button>
        </div>
    </div>

    <div id="privacyModal" class="modal-overlay hidden">
        <div class="modal">
            <h2>🔒 Приватность</h2>
            <div class="form-group">
                <label>Кто может писать</label>
                <select id="privacyLevel">
                    <option value="all">Все</option>
                    <option value="friends">Друзья</option>
                    <option value="nobody">Никто</option>
                </select>
            </div>
            <div class="form-group">
                <label>Уведомления</label>
                <select id="privacyNotifications">
                    <option value="true">Включены</option>
                    <option value="false">Выключены</option>
                </select>
            </div>
            <div class="form-group">
                <label>Звук</label>
                <select id="privacySound">
                    <option value="true">Включен</option>
                    <option value="false">Выключен</option>
                </select>
            </div>
            <button class="btn-primary" id="savePrivacyBtn">Сохранить</button>
            <button class="btn-primary btn-secondary" id="closePrivacyBtn">Отмена</button>
        </div>
    </div>

    <div id="themeModal" class="modal-overlay hidden">
        <div class="modal">
            <h2>🎨 Тема</h2>
            <div class="form-group">
                <label>Цвет акцента</label>
                <div class="theme-preview">
                    <div class="theme-color active" data-color="#007aff" style="background:#007aff"></div>
                    <div class="theme-color" data-color="#34c759" style="background:#34c759"></div>
                    <div class="theme-color" data-color="#ff9500" style="background:#ff9500"></div>
                    <div class="theme-color" data-color="#ff3b30" style="background:#ff3b30"></div>
                </div>
            </div>
            <button class="btn-primary" id="saveThemeBtn">Сохранить</button>
            <button class="btn-primary btn-secondary" id="closeThemeBtn">Отмена</button>
        </div>
    </div>

    <div id="groupModal" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="groupModalTitle">Создать группу</h2>
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="groupName">
            </div>
            <div class="form-group">
                <label>Участники</label>
                <div class="member-select" id="memberSelect"></div>
            </div>
            <button class="btn-primary" id="createGroupBtn">Создать</button>
            <button class="btn-primary btn-secondary" id="closeGroupBtn">Отмена</button>
        </div>
    </div>

    <div id="foldersModal" class="modal-overlay hidden">
        <div class="modal">
            <h2>📁 Папки</h2>
            <div class="form-group">
                <label>Создать папку</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="newFolderName" placeholder="Название">
                    <input type="text" id="newFolderIcon" placeholder="📁" style="width:60px;">
                    <button class="btn-primary" id="createFolderBtn" style="width:auto;">+</button>
                </div>
            </div>
            <div id="foldersList"></div>
            <button class="btn-primary btn-secondary" id="closeFoldersBtn">Закрыть</button>
        </div>
    </div>

    <div id="notificationContainer"></div>
    <audio id="notificationSound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU"></audio>

    <!-- SCRIPTS -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
