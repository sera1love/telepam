<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Telepam Messenger</title>
<link rel="stylesheet" href="public/css/main.css">
<link rel="stylesheet" href="public/css/auth.css">
<link rel="stylesheet" href="public/css/chat.css">
<link rel="stylesheet" href="public/css/components.css">
</head>
<body>
    <!-- 🔐 Модальное окно авторизации -->
    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <h2>Вход в Telepam</h2>
            <form id="authForm">
                <input type="text" id="usernameInput" placeholder="Ваше имя" required minlength="2" maxlength="20">
                <button type="submit">Войти</button>
            </form>
        </div>
    </div>

    <!-- 💬 Основной интерфейс -->
    <div id="appInterface" class="hidden">
        <aside class="sidebar" id="sidebar">
            <div id="myProfile"></div>
            <nav id="foldersList"></nav>
            <div id="chatList"></div>
        </aside>
        <main class="chat-area">
            <header id="chatHeader"></header>
            <div id="messagesList" class="messages"></div>
            <div id="typingIndicator" class="typing hidden"></div>
            <footer class="chat-input">
                <textarea id="messageInput" placeholder="Сообщение..."></textarea>
                <button id="sendBtn">➤</button>
                <button id="recordBtn">🎤</button>
            </footer>
        </main>
    </div>

    <!-- Скрипты -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="public/js/crypto.js"></script>
    <script src="public/js/utils.js"></script>
    <script src="public/js/auth.js"></script>
    <script src="public/js/chat.js"></script>
    <script src="public/js/messages.js"></script>
    <script src="public/js/app.js"></script>
</body>
</html>
